<!DOCTYPE html>
<html>
<head>
    <title>Job Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Job Finder</h1>

    <div class="container">
        {% for job in jobs %}
            <div class="card">
                <h3>{{ job.title }}</h3>
                <p>{{ job.source }}</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
