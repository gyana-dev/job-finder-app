<!DOCTYPE html>
<html>
<head>
    <title>Job Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>Job Finder</h1>

    <div class="container">

        {% for job in jobs %}
        <div class="card">

            <h2>{{ job.title }}</h2>

            <p><b>Company:</b> {{ job.company }}</p>

            <p><b>Location:</b> {{ job.location }}</p>

            <p><b>Source:</b> {{ job.source }}</p>

            {% if job.link %}
            <a href="{{ job.link }}" target="_blank">
                Apply Now
            </a>
            {% endif %}

        </div>
        {% endfor %}

    </div>

</body>
</html>
